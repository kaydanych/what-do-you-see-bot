services:
  photobot:
    build: .
    container_name: photobot
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      # On the Synology change the left side to /volume1/docker/photobot/data
      - ./data:/data
      # Code mounted from the host so pure-Python changes deploy with a plain
      # Restart — no rebuild. Synology's Build reuses cached layers, so a baked
      # image otherwise keeps running stale code. Changing requirements.txt
      # still needs a real rebuild (Stop -> delete image -> Build).
      - ./photobot:/app/photobot
